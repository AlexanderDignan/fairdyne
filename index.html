<html>

<head>

	<meta charset="utf-8">
	<title>Fairdyne — Character Select</title>
	<link rel="stylesheet" href="common/css/undertale.css">

	<style>
		html, body {
			height: 100%;
		}

		body {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			min-height: 100%;
			box-sizing: border-box;
			padding-bottom: 80px;
		}

		.prompt {
			font-size: 16px;
			margin: 0 0 32px;
			letter-spacing: 1px;
		}

		.roster {
			display: flex;
			gap: 48px;
			align-items: flex-end;
		}

		.character {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 10px;
			cursor: pointer;
			opacity: 0.4;
			transition: opacity 0.1s;
			width: 160px;
		}

		.character.selected {
			opacity: 1;
		}

		.character img {
			height: 200px;
			object-fit: contain;
			object-position: bottom;
			display: block;
		}

		.character .label {
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 16px;
		}

		.heart {
			color: #c00;
			visibility: hidden;
		}

		.character.selected .heart {
			visibility: visible;
		}

		.character .desc {
			font-size: 10px;
			color: #555;
			text-align: center;
		}

		.character.selected .desc {
			color: #999;
		}

		.hint {
			font-size: 11px;
			color: #444;
			margin: 20px 0 0;
			letter-spacing: 1px;
		}
	</style>

</head>

<body>

	<p class="prompt">* Who do you want to fight?</p>

	<div class="roster">
		<div class="character selected" data-index="0">
			<img src="undyne/img/undyne.png" alt="Undyne">
			<div class="label">
				<span class="heart">&#9829;</span>
				<span>Undyne</span>
			</div>
			<div class="desc">Captain of the Royal Guard</div>
		</div>
		<div class="character" data-index="1">
			<img src="mettaton/img/Mettaton_static.png" alt="Mettaton">
			<div class="label">
				<span class="heart">&#9829;</span>
				<span>Mettaton</span>
			</div>
			<div class="desc">Hottest Robot in Showbiz</div>
		</div>
		<div class="character" data-index="2">
			<img src="papyrus/img/papyrus.png" alt="Papyrus">
			<div class="label">
				<span class="heart">&#9829;</span>
				<span>Papyrus</span>
			</div>
			<div class="desc">The Great Papyrus</div>
		</div>
	</div>

	<p class="hint">&#8592; &#8594; to choose &nbsp;&nbsp; Enter to fight</p>

	<div class="bottom-credits">
		<p>
			<span><span id="fairdyne">Fairdyne</span> v.0.99, by <a href="/">Alexander Dignan</a>.</span>
			<br />
			<span>Undertale &copy; 2015 Toby Fox.</span>
		</p>
	</div>

	<script>
		var urls = ['undyne/index.html', 'mettaton/index.html', 'papyrus/index.html'];
		var chars = document.querySelectorAll('.character');
		var current = 0;

		function select(i) {
			chars[current].classList.remove('selected');
			current = i;
			chars[current].classList.add('selected');
		}

		function go() {
			window.location.href = urls[current];
		}

		chars.forEach(function(el) {
			el.addEventListener('mouseenter', function() {
				select(parseInt(el.dataset.index));
			});
			el.addEventListener('click', go);
		});

		document.addEventListener('keydown', function(e) {
			if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
				if (current > 0) select(current - 1);
			} else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
				if (current < chars.length - 1) select(current + 1);
			} else if (e.key === 'Enter' || e.key === 'z' || e.key === 'Z') {
				go();
			}
		});
	</script>

</body>

</html>
